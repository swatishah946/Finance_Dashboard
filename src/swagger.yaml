openapi: 3.0.0
info:
  title: Finance Dashboard API
  version: 1.0.0
  description: API documentation for the Finance Dashboard backend assessment. Features JWT Auth, RBAC, and analytics.
servers:
  - url: http://localhost:5000/api
    description: Development Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      summary: Authenticate user & get token
      security: []
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: admin@example.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Successful login
        '400':
          description: Validation Error

  /auth/profile:
    get:
      summary: Get currently logged in user profile
      tags:
        - Authentication
      responses:
        '200':
          description: Profile retrieved

  /users:
    get:
      summary: View all users and their status
      description: Requires 'manage:users' permission (Admin only)
      tags:
        - User Management
      responses:
        '200':
          description: A list of all users
    post:
      summary: Create a new user
      description: Requires 'manage:users' permission (Admin only)
      tags:
        - User Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - role
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: newuser@example.com
                password:
                  type: string
                  example: securepassword123
                role:
                  type: string
                  enum: [admin, analyst, viewer]
                  example: analyst
      responses:
        '201':
          description: User created successfully

  /users/password:
    put:
      summary: Change your current password
      description: Available to all authenticated users
      tags:
        - User Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                  example: password123
                newPassword:
                  type: string
                  example: newSecurePassword2026
      responses:
        '200':
          description: Password updated successfully

  /users/{id}/status:
    put:
      summary: Change a user's status (active/inactive)
      description: Requires 'manage:users' permission (Admin only)
      tags:
        - User Management
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [active, inactive, suspended]
                  example: inactive
      responses:
        '200':
          description: Status updated successfully
        '403':
          description: Forbidden (Cannot change own status)

  /dashboard/summary:
    get:
      summary: Get dashboard summary totals
      description: Requires 'read:dashboard' permission (Admin, Analyst, Viewer)
      tags:
        - Dashboard
      responses:
        '200':
          description: Summary retrieved

  /dashboard/categories:
    get:
      summary: Get expenses and income aggregated by category
      tags:
        - Dashboard
      responses:
        '200':
          description: Category breakdown retrieved

  /dashboard/trends:
    get:
      summary: Get monthly income vs expense trends
      tags:
        - Dashboard
      responses:
        '200':
          description: Trends retrieved

  /records:
    get:
      summary: Get all records
      description: Admins see all. Owners see their own. Requires 'read:records' permission.
      tags:
        - Financial Records
      responses:
        '200':
          description: A list of financial records
    post:
      summary: Create a new financial record
      description: Requires 'create:records' permission (Admin, Analyst)
      tags:
        - Financial Records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - type
                - category
              properties:
                amount:
                  type: number
                  example: 300.50
                type:
                  type: string
                  enum: [income, expense]
                  example: expense
                category:
                  type: string
                  example: software
                description:
                  type: string
                  example: GitHub Subscription
                date:
                  type: string
                  format: date
      responses:
        '201':
          description: Record created successfully
        '403':
          description: Forbidden (Viewer role blocks this)

  /records/{id}:
    delete:
      summary: Delete a financial record
      description: Requires 'delete:records' permission (Admin only)
      tags:
        - Financial Records
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successful deletion
        '403':
          description: Forbidden (Only admins can delete)
